<!DOCTYPE html>
<html lang="zxx">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="css/figma.css">
	<title>figma</title>
</head>

<body>
	<header>
		<h1 class="headline">
			Its figma.html
		</h1>
		<ul class="to-main">
			<li class="to-main-item">
				<a href="index.html">
					На основну
				</a>
			</li>
		</ul>
	</header>
	<div class="wrapper">
		<main>
			<section class="get-in-touch">
				<div class="get-in-touch-container">
					<div class="get-in-touch-content">
						<h2>
							Figma
						</h2>
						<form method="get" action="#" enctype="multipart/form-data" class="get-in-touch-form">
							<div class="name">
								<label for="name">
									<span>
										Your name
									</span>
									<input id="name" required type="text" maxlength="20" minlength="2"
										autocomplete="off" name="form[]" placeholder="Abc">
								</label>
							</div>
							<div class="email">
								<label for="email">
									<span>
										Email address
									</span>
									<input id="email" required type="email" maxlength="30" minlength="8"
										autocomplete="on" name="form[]" placeholder="Abc@def.com">
								</label>
							</div>
							<div class="subject">
								<label for="subject">
									<span>
										Subject
									</span>
									<input id="subject" required type="text" maxlength="30" minlength="10"
										autocomplete="off" name="form[]" placeholder="This is an optional">
								</label>
							</div>
							<div class="message-container">
								<label for="message">
									<span>
										Message
									</span>
									<textarea id="message" placeholder="Hi! i’d like to ask about"></textarea>
								</label>
							</div>
							<div class="button">
								<button type="submit">
									Submit
								</button>
							</div>
						</form>
					</div>
				</div>
			</section>
			<section class="asgaard-sofa">
				<div class="asgaard-sofa-container">
					<div class="asgaard-sofa-content">
						<h2>
							Figma
						</h2>
						<div class="asgaard-sofa-size-color">
							<form method="get" action="#" enctype="multipart/form-data" class="size-color-form">
								<div class="size-form">
									<div>
										<span>
											Size
										</span>
										<label for="l">
											<span>
												L
											</span>
											<input checked id="l" type="radio" name="size">
										</label>
										<label for="xl">
											<span>
												XL
											</span>
											<input id="xl" type="radio" name="size">
										</label>
										<label for="xs">
											<span>
												XS
											</span>
											<input id="xs" type="radio" name="size">
										</label>
									</div>
								</div>
								<div class="color-form">
									<div>
										<span>
											Color
										</span>
										<label for="purple">
											<input checked id="purple" type="radio" name="color">
										</label>
										<label for="black">
											<input id="black" type="radio" name="color">
										</label>
										<label for="brown">
											<input id="brown" type="radio" name="color">
										</label>
									</div>
								</div>
							</form>
						</div>
					</div>
				</div>
			</section>
		</main>
	</div>
	<footer>

	</footer>
</body>

</html>
